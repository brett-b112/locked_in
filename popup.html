<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Locked In</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <span class="logo">🔒</span>
    <span class="title">Locked In</span>
  </div>

  <form class="add-form" id="add-form">
    <input
      type="text"
      id="site-input"
      class="site-input"
      placeholder="reddit.com"
      autocomplete="off"
      spellcheck="false"
    >
    <button type="submit" class="btn-add">Block</button>
  </form>
  <p class="input-error" id="input-error"></p>

  <div class="pomodoro-section">
    <div class="pomodoro-display">
      <span class="pomodoro-time" id="pomodoro-time">--:--</span>
      <span class="pomodoro-label">🍅 Pomodoro</span>
    </div>
    <div class="pomodoro-presets">
      <button class="btn-preset" data-minutes="25">25m</button>
      <button class="btn-preset" data-minutes="5">5m</button>
      <button class="btn-preset" data-minutes="30">30m</button>
      <button class="btn-stop" id="btn-stop">Stop</button>
    </div>
  </div>

  <div class="list-header">Blocked Sites</div>
  <ul class="site-list" id="site-list"></ul>
  <p class="empty-state" id="empty-state">No sites blocked yet.</p>

  <script src="popup.js"></script>
</body>
</html>
